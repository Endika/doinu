name: Release Please

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - id: release
        uses: googleapis/release-please-action@v5
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      - if: ${{ steps.release.outputs.pr }}
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          REPO: ${{ github.repository }}
          PR_JSON: ${{ steps.release.outputs.pr }}
        run: gh pr merge --rebase --auto -R "$REPO" "$(echo "$PR_JSON" | jq -r .number)"

      # No explicit redeploy on release: the version-bump commit is merged with
      # RELEASE_PLEASE_TOKEN (a PAT), so it triggers the on:push Deploy by itself
      # with the bumped version. A second dispatched deploy only collided with
      # that one and got cancelled by the Pages concurrency (the "red" runs).
