<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#7c5cff" />
    <link rel="icon" href="favicon.ico" sizes="48x48" />
    <link rel="icon" href="favicon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="apple-touch-icon-180x180.png" />
    <title>Doinu</title>
    <style>
      :root {
        --font: 'Baloo 2', 'Fredoka', 'Nunito', system-ui, 'Segoe UI', sans-serif;
        --ink: #2a2350;
        --sky: linear-gradient(160deg, #5ec8ff 0%, #a07bff 55%, #ff8fd6 100%);
      }
      html,
      body {
        margin: 0;
        height: 100%;
        background: var(--sky);
        color: var(--ink);
        font-family: var(--font);
        overflow: hidden;
        -webkit-tap-highlight-color: transparent;
      }
      #app {
        display: flex;
        flex-direction: column;
        width: 100vw;
        height: 100vh;
      }
      /* The play field: a rich, lively violet so the coloured notes pop —
         bright and friendly, never a black void. */
      #stage {
        display: block;
        flex: 1 1 auto;
        width: 100%;
        min-height: 0;
        background: linear-gradient(180deg, #4634a6 0%, #6a47cf 60%, #8a5be0 100%);
      }
      /* A cheerful shelf under the keyboard. */
      #keys {
        display: block;
        flex: 0 0 26vh;
        width: 100%;
        background: linear-gradient(180deg, #ffd86b 0%, #ffc24d 100%);
        box-shadow: inset 0 4px 0 rgba(255, 255, 255, 0.5);
      }
      /* Big, game-y banner for instructions and celebrations. */
      #status {
        position: fixed;
        top: 1.1rem;
        left: 50%;
        transform: translateX(-50%);
        text-align: center;
        white-space: pre-line;
        font-size: clamp(1.5rem, 5.5vw, 2.6rem);
        font-weight: 800;
        line-height: 1.15;
        color: #fff;
        padding: 0.45rem 1.4rem;
        border-radius: 1.4rem;
        background: rgba(42, 35, 80, 0.5);
        text-shadow: 0 2px 10px rgba(40, 20, 90, 0.6);
        pointer-events: none;
        max-width: 92vw;
        z-index: 15;
      }
      #status:empty {
        display: none;
      }
      #status.pop {
        animation: status-pop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      }
      @keyframes status-pop {
        0% { transform: translateX(-50%) scale(0.6); }
        60% { transform: translateX(-50%) scale(1.12); }
        100% { transform: translateX(-50%) scale(1); }
      }
      /* Round, chunky floating buttons (report + back). */
      #report-toggle,
      #back-menu {
        position: fixed;
        z-index: 25;
        border: none;
        border-radius: 999px;
        background: #fff;
        color: var(--ink);
        font-family: var(--font);
        font-weight: 700;
        cursor: pointer;
        box-shadow: 0 6px 16px rgba(60, 30, 120, 0.35);
        transition: transform 0.12s ease;
      }
      #report-toggle:active,
      #back-menu:active {
        transform: scale(0.92);
      }
      #report-toggle {
        top: 0.9rem;
        right: 0.9rem;
        width: 3rem;
        height: 3rem;
        font-size: 1.4rem;
        line-height: 1;
      }
      #back-menu {
        top: 0.9rem;
        left: 0.9rem;
        padding: 0.7rem 1.2rem;
        font-size: 1.05rem;
      }
      #back-menu.hidden {
        display: none;
      }
      #report {
        position: fixed;
        top: 4.2rem;
        right: 0.9rem;
        z-index: 25;
        display: none;
        max-width: min(92vw, 34rem);
        max-height: 70vh;
        overflow: auto;
        padding: 1rem 1.2rem;
        border-radius: 1.1rem;
        background: #fff;
        color: var(--ink);
        font-size: 0.95rem;
        line-height: 1.6;
        box-shadow: 0 14px 36px rgba(60, 30, 120, 0.4);
      }
      #report.open {
        display: block;
      }
      #report > div {
        padding: 0.35rem 0;
        border-bottom: 1px solid rgba(120, 90, 200, 0.16);
      }
      /* ---- Start screen: the first impression, made to invite play ---- */
      #menu {
        position: fixed;
        inset: 0;
        z-index: 30;
        display: flex;
        flex-direction: column;
        align-items: center;
        /* flex-start + auto margins on the children: the card group centres when
           it fits and becomes scrollable (not clipped) on short screens. */
        justify-content: flex-start;
        gap: 1.25rem;
        background: var(--sky);
        overflow-y: auto;
        padding: 1.25rem 0 3.25rem;
        box-sizing: border-box;
      }
      #menu.hidden {
        display: none;
      }
      /* Language toggle: a small chunky pill fixed top-right of the start screen. */
      #lang-toggle {
        position: fixed;
        top: 0.9rem;
        right: 0.9rem;
        z-index: 31;
        min-width: 3rem;
        padding: 0.6rem 1rem;
        border: none;
        border-radius: 999px;
        background: #fff;
        color: var(--ink);
        font-family: var(--font);
        font-size: 1rem;
        font-weight: 800;
        cursor: pointer;
        box-shadow: 0 6px 16px rgba(60, 30, 120, 0.35);
        transition: transform 0.12s ease;
      }
      #lang-toggle:active {
        transform: scale(0.92);
      }
      #menu .menu-card {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 1.1rem;
        width: min(86vw, 24rem);
        padding: 1.75rem 1.5rem 2rem;
        border-radius: 1.75rem;
        background: rgba(255, 255, 255, 0.92);
        box-shadow: 0 20px 50px rgba(60, 30, 120, 0.35);
        margin-top: auto; /* centres vertically when there is room */
        flex: 0 0 auto;
      }
      #menu .menu-status {
        margin-bottom: auto; /* pairs with the card's margin-top:auto to centre */
      }
      #menu .menu-title {
        margin: 0;
        font-size: 3rem;
        font-weight: 800;
        color: var(--ink);
        animation: bob 2.4s ease-in-out infinite;
      }
      #menu .menu-sub {
        margin: -0.5rem 0 0.25rem;
        font-size: 1.1rem;
        font-weight: 600;
        color: #8a5be0;
      }
      #menu .menu-list {
        display: flex;
        flex-direction: column;
        gap: 0.8rem;
        width: 100%;
      }
      .menu-btn {
        padding: 1rem 1.25rem;
        border: none;
        border-radius: 999px;
        color: #fff;
        background: #8a7bff; /* default; menu activities override below */
        font-family: var(--font);
        font-size: 1.2rem;
        font-weight: 700;
        cursor: pointer;
        box-shadow: 0 6px 0 rgba(0, 0, 0, 0.14);
        transition: transform 0.12s ease, box-shadow 0.12s ease;
      }
      .menu-btn:hover {
        transform: translateY(-2px);
      }
      .menu-btn:active {
        transform: translateY(3px);
        box-shadow: 0 2px 0 rgba(0, 0, 0, 0.14);
      }
      .menu-btn[data-activity='melody'] { background: #ff7eb3; }
      .menu-btn[data-activity='songs'] { background: #ff6b9d; }
      .menu-btn[data-activity='import'] { background: #c08bff; }
      .menu-btn[data-activity='practice'] { background: #7c83ff; }
      .menu-btn[data-activity='progress'] { background: #ffb454; }
      /* Songs / Progress / Path overlays: reuse the menu look; scrollable content. */
      #songs,
      #progress,
      #path {
        position: fixed;
        inset: 0;
        z-index: 30;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: var(--sky);
      }
      #songs.hidden,
      #progress.hidden,
      #path.hidden {
        display: none;
      }
      /* Fill most of the screen as a single flex column: the title/sub stay put,
         only the inner list scrolls (no nested double-scroll), and it is a touch
         bigger than the start-menu card. */
      #songs .menu-card,
      #progress .menu-card,
      #path .menu-card {
        display: flex;
        flex-direction: column;
        align-items: stretch;
        gap: 0.55rem;
        width: min(94vw, 30rem);
        height: 92vh;
        max-height: 92vh;
        padding: 1.1rem 1.1rem 0.9rem;
        box-sizing: border-box;
      }
      #songs .menu-title,
      #progress .menu-title,
      #path .menu-title,
      #songs .menu-sub,
      #progress .menu-sub,
      #path .menu-sub {
        flex: 0 0 auto;
        text-align: center;
      }
      #songs-back,
      #progress-back,
      #path-back {
        flex: 0 0 auto;
      }
      .progress-content {
        width: 100%;
        flex: 1 1 auto;
        min-height: 0;
        overflow-y: auto;
        text-align: left;
        color: var(--ink);
        font-size: 0.95rem;
        line-height: 1.5;
      }
      .progress-content > div {
        padding: 0.4rem 0.2rem;
        border-bottom: 1px solid rgba(120, 90, 200, 0.16);
      }
      .progress-content:empty::before {
        content: var(--progress-empty, 'Play a little and your progress shows up here ✨');
        color: #8a5be0;
        font-weight: 600;
      }
      #progress-back {
        margin-top: 0.6rem;
        background: #6d5dfc;
      }
      #song-list {
        flex: 1 1 auto;
        min-height: 0;
        overflow-x: hidden; /* only ever scroll vertically — no stray horizontal bar */
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        padding-right: 0.25rem;
        gap: 0.6rem;
      }
      /* Uniform song card: title + an equal-width row of hand buttons. */
      .song-card {
        width: 100%;
        box-sizing: border-box;
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
        padding: 0.65rem 0.7rem 0.7rem;
        border-radius: 1rem;
        background: rgba(124, 92, 255, 0.16);
      }
      .song-title {
        text-align: left;
        padding-left: 0.15rem;
        font-size: 1.05rem;
        font-weight: 800;
        color: var(--ink);
      }
      .song-section {
        width: 100%;
        text-align: left;
        padding: 0.5rem 0.15rem 0.1rem;
        font-size: 1.1rem;
        font-weight: 800;
        color: #8a5be0;
      }
      .song-hands {
        display: flex;
        gap: 0.4rem;
      }
      .hand-btn {
        flex: 1 1 0;
        min-width: 0;
        padding: 0.6rem 0.3rem;
        border: none;
        border-radius: 0.7rem;
        color: #fff;
        font-family: var(--font);
        font-weight: 700;
        font-size: 0.92rem;
        cursor: pointer;
        box-shadow: 0 4px 0 rgba(0, 0, 0, 0.14);
        transition: transform 0.1s ease, box-shadow 0.1s ease;
      }
      .hand-btn:active {
        transform: translateY(2px);
        box-shadow: 0 1px 0 rgba(0, 0, 0, 0.14);
      }
      .hand-btn[data-hand='R'] { background: #ff7eb3; }
      .hand-btn[data-hand='L'] { background: #4fc3f7; }
      .hand-btn[data-hand='both'] { background: #4cd4a0; }
      #songs-back {
        margin-top: 0.6rem;
        background: #6d5dfc;
      }
      /* Learning path: a vertical journey of units, each a group of lesson nodes. */
      #path-list {
        flex: 1 1 auto;
        min-height: 0;
        overflow-x: hidden;
        overflow-y: auto;
        padding-right: 0.25rem;
        gap: 0.7rem;
      }
      /* Compose / My melodies: reuse the overlay look + a small naming modal. */
      #mymelodies {
        position: fixed;
        inset: 0;
        z-index: 30;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: var(--sky);
      }
      #mymelodies.hidden { display: none; }
      #mymelodies .menu-card {
        display: flex;
        flex-direction: column;
        align-items: stretch;
        gap: 0.55rem;
        width: min(94vw, 30rem);
        height: 92vh;
        max-height: 92vh;
        padding: 1.1rem 1.1rem 0.9rem;
        box-sizing: border-box;
      }
      #mymelodies .menu-title,
      #mymelodies .menu-sub { flex: 0 0 auto; text-align: center; }
      #compose-record { flex: 0 0 auto; background: #ff5d8f; }
      #mymelodies-back { flex: 0 0 auto; margin-top: 0.4rem; background: #6d5dfc; }
      #melody-list {
        flex: 1 1 auto;
        min-height: 0;
        overflow-x: hidden;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        padding-right: 0.25rem;
        gap: 0.6rem;
      }
      .menu-btn[data-activity='compose'] { background: #ff5d8f; }
      .hidden { display: none; }
      #mic-enable { background: #e0356b; }
      #input-toggle { background: #6d5dfc; font-size: 0.98rem; padding: 0.7rem 1rem; }
      #wait-toggle { background: #7c83ff; font-size: 0.98rem; padding: 0.7rem 1rem; }
      .menu-btn[data-activity='mictest'] { background: #5cd0e0; }
      #mictest {
        position: fixed;
        inset: 0;
        z-index: 30;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: var(--sky);
      }
      #mictest.hidden { display: none; }
      #mictest .menu-card {
        display: flex;
        flex-direction: column;
        align-items: stretch;
        gap: 0.7rem;
        width: min(94vw, 26rem);
        padding: 1.2rem;
        box-sizing: border-box;
      }
      #mictest .menu-title,
      #mictest .menu-sub { text-align: center; }
      #mictest-note {
        text-align: center;
        font-size: 3.4rem;
        font-weight: 800;
        color: var(--ink);
        min-height: 4rem;
        line-height: 1.1;
      }
      #mictest-state { text-align: center; font-weight: 700; color: #8a5be0; min-height: 1.4rem; }
      #mictest-meter {
        position: relative;
        height: 1.6rem;
        border-radius: 0.8rem;
        background: rgba(124, 92, 255, 0.18);
        overflow: hidden;
      }
      #mictest-level { height: 100%; width: 0%; background: #4cd4a0; }
      #mictest-gate { position: absolute; top: 0; bottom: 0; width: 3px; background: #e0356b; left: 10%; }
      #mictest-sens { display: flex; flex-direction: column; gap: 0.3rem; font-weight: 700; color: var(--ink); }
      #mictest-slider { width: 100%; }
      #mictest-calibrate { background: #ff9f6b; }
      #mictest-back { background: #6d5dfc; }
      #compose-stop {
        position: fixed;
        left: 50%;
        bottom: 1.4rem;
        transform: translateX(-50%);
        z-index: 26;
        border: none;
        border-radius: 999px;
        padding: 0.9rem 2.2rem;
        font-family: var(--font);
        font-size: 1.2rem;
        font-weight: 800;
        color: #fff;
        background: #e0356b;
        cursor: pointer;
        box-shadow: 0 8px 20px rgba(120, 20, 60, 0.45);
      }
      #compose-stop.hidden { display: none; }
      #name-prompt {
        position: fixed;
        inset: 0;
        z-index: 32;
        display: flex;
        align-items: center;
        justify-content: center;
        background: rgba(40, 20, 90, 0.55);
      }
      #name-prompt.hidden { display: none; }
      .name-card {
        display: flex;
        flex-direction: column;
        gap: 0.9rem;
        width: min(88vw, 22rem);
        padding: 1.4rem;
        border-radius: 1.4rem;
        background: #fff;
        box-shadow: 0 20px 50px rgba(60, 30, 120, 0.5);
      }
      .name-q { margin: 0; text-align: center; font-size: 1.2rem; font-weight: 800; color: var(--ink); }
      #name-input {
        font-family: var(--font);
        font-size: 1.2rem;
        padding: 0.7rem 0.9rem;
        border: 2px solid #c9b8ff;
        border-radius: 0.8rem;
        color: var(--ink);
        text-align: center;
      }
      #name-input:focus { outline: none; border-color: #8a5be0; }
      .name-actions { display: flex; gap: 0.6rem; }
      .name-actions .menu-btn { flex: 1 1 0; font-size: 1.05rem; padding: 0.8rem 0.5rem; }
      #name-save { background: #4cd4a0; }
      #name-cancel { background: #ff8f6b; }
      .path-unit {
        width: 100%;
        box-sizing: border-box;
        display: flex;
        flex-direction: column;
        gap: 0.45rem;
        padding: 0.55rem 0.7rem 0.7rem;
        border-radius: 1rem;
        background: rgba(124, 92, 255, 0.16);
      }
      .path-unit-title {
        text-align: left;
        padding-left: 0.15rem;
        font-size: 1.02rem;
        font-weight: 800;
        color: var(--ink);
      }
      .path-node {
        width: 100%;
        box-sizing: border-box;
        display: flex;
        align-items: center;
        gap: 0.55rem;
        padding: 0.6rem 0.7rem;
        border: none;
        border-radius: 0.8rem;
        text-align: left;
        font-family: var(--font);
        cursor: pointer;
        color: #fff;
        box-shadow: 0 4px 0 rgba(0, 0, 0, 0.14);
        transition: transform 0.1s ease, box-shadow 0.1s ease;
        background: #7c83ff;
      }
      .path-node:active { transform: translateY(2px); box-shadow: 0 1px 0 rgba(0, 0, 0, 0.14); }
      .path-node-icon { font-size: 1.2rem; flex: 0 0 auto; }
      .path-node-text { display: flex; flex-direction: column; min-width: 0; }
      .path-node-title { font-weight: 800; font-size: 0.98rem; }
      .path-node-concept { font-weight: 600; font-size: 0.8rem; opacity: 0.92; }
      .path-node--current { background: #ff7eb3; box-shadow: 0 4px 0 rgba(0, 0, 0, 0.18); }
      .path-node--passed { background: #4cd4a0; }
      .path-node--mastered { background: #ffb454; }
      .path-node--locked,
      .path-node--soon {
        background: rgba(124, 92, 255, 0.28);
        color: rgba(40, 20, 90, 0.6);
        box-shadow: none;
        cursor: not-allowed;
      }
      #path-back {
        margin-top: 0.6rem;
        background: #6d5dfc;
      }
      .menu-btn[data-activity='path'] { background: #8ad4ff; }
      .menu-btn[data-activity='echo'] { background: #4fc3f7; }
      .menu-btn[data-activity='c-major-up'] { background: #ffa14a; }
      .menu-btn[data-activity='c-major-updown'] { background: #b07bff; }
      .menu-btn[data-activity='memory'] { background: #ff9f6b; }
      .menu-btn[data-activity='notefind'] { background: #5cd0e0; }
      .menu-btn[data-activity='ear'] { background: #f78fb3; }
      .menu-btn[data-activity='rhythm'] { background: #ffa64d; }
      .menu-btn[data-activity='free'] { background: #4cd4a0; }
      #menu .menu-status {
        min-height: 1.2rem;
        max-width: min(86vw, 24rem);
        text-align: center;
        font-size: 1rem;
        font-weight: 600;
        color: #fff;
        text-shadow: 0 2px 6px rgba(40, 20, 90, 0.45);
      }
      #menu .menu-version {
        position: fixed;
        bottom: 0.9rem;
        left: 0;
        right: 0;
        margin: 0;
        text-align: center;
        font-size: 0.85rem;
        font-weight: 600;
        color: rgba(255, 255, 255, 0.85);
        text-shadow: 0 1px 4px rgba(40, 20, 90, 0.4);
      }
      @keyframes bob {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-8px); }
      }
      @media (prefers-reduced-motion: reduce) {
        #menu .menu-title { animation: none; }
      }
    </style>
  </head>
  <body>
    <div id="app">
      <canvas id="stage"></canvas>
      <canvas id="keys"></canvas>
    </div>
    <div id="status"></div>
    <div id="menu">
      <button id="lang-toggle" type="button" data-i18n="lang.toggle">ES</button>
      <div class="menu-card">
        <h1 class="menu-title">🎹 Doinu</h1>
        <p class="menu-sub" data-i18n="menu.sub">¡A jugar! 🎶</p>
        <div class="menu-list">
          <button class="menu-btn" type="button" data-activity="path" data-i18n="act.path">🗺️ Path</button>
          <button class="menu-btn" type="button" data-activity="melody" data-i18n="act.melody">🎵 Melody</button>
          <button class="menu-btn" type="button" data-activity="songs" data-i18n="act.songs">🎶 Songs</button>
          <button class="menu-btn" type="button" data-activity="import" data-i18n="act.import">📂 Load MIDI</button>
          <button class="menu-btn" type="button" data-activity="compose" data-i18n="act.compose">🎤 Make a melody</button>
          <button class="menu-btn" type="button" data-activity="practice" data-i18n="act.practice">🐢 Practice (wait)</button>
          <button class="menu-btn" type="button" data-activity="progress" data-i18n="act.progress">📊 Progress</button>
          <button class="menu-btn" type="button" data-activity="echo" data-i18n="act.echo">🔁 Echo</button>
          <button class="menu-btn" type="button" data-activity="memory" data-i18n="act.memory">🧠 Memory</button>
          <button class="menu-btn" type="button" data-activity="notefind" data-i18n="act.notefind">🔎 Find the note</button>
          <button class="menu-btn" type="button" data-activity="ear" data-i18n="act.ear">👂 Listen &amp; play</button>
          <button class="menu-btn" type="button" data-activity="rhythm" data-i18n="act.rhythm">🥁 Tap the beat</button>
          <button class="menu-btn" type="button" data-activity="c-major-up" data-i18n="act.scaleup">🪜 Scale up</button>
          <button class="menu-btn" type="button" data-activity="c-major-updown" data-i18n="act.scaleupdown">🎢 Scale up &amp; down</button>
          <button class="menu-btn" type="button" data-activity="free" data-i18n="act.free">✨ Free play</button>
        </div>
        <button id="mic-enable" class="menu-btn hidden" type="button" data-i18n="input.micEnable">🎤 Enable microphone</button>
        <button id="input-toggle" class="menu-btn hidden" type="button">🎤 Use microphone</button>
        <button id="wait-toggle" class="menu-btn" type="button">🐢 Wait for the note: ON</button>
        <button id="mictest-btn" class="menu-btn hidden" type="button" data-activity="mictest" data-i18n="act.mictest">🎤 Mic test</button>
      </div>
      <div id="menu-status" class="menu-status"></div>
      <p id="version" class="menu-version"></p>
    </div>
    <div id="songs" class="hidden">

        <button id="songs-back" class="menu-btn" type="button" data-i18n="nav.back">← Menu</button>

        <button id="path-back" class="menu-btn" type="button" data-i18n="nav.back">← Menu</button>
      </div>
    </div>
    <div id="progress" class="hidden">
      <div class="menu-card">

          <button id="name-save" class="menu-btn" type="button" data-i18n="compose.save">💾 Save</button>
