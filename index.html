<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0a0a0f" />
    <title>Doinu</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        background: #0a0a0f;
        color: #e8e8ef;
        font-family: system-ui, sans-serif;
        overflow: hidden;
      }
      #app {
        display: flex;
        flex-direction: column;
        width: 100vw;
        height: 100vh;
      }
      #stage {
        display: block;
        flex: 1 1 auto;
        width: 100%;
        min-height: 0;
      }
      #keys {
        display: block;
        flex: 0 0 26vh;
        width: 100%;
      }
      #status {
        position: fixed;
        top: 1rem;
        left: 50%;
        transform: translateX(-50%);
        text-align: center;
        white-space: pre-line;
        font-size: 1rem;
        pointer-events: none;
        text-shadow: 0 1px 4px rgba(0, 0, 0, 0.8);
      }
    </style>
  </head>
  <body>
    <div id="app">
      <canvas id="stage"></canvas>
      <canvas id="keys"></canvas>
    </div>
    <div id="status"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
