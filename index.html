<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#7c5cff" />
    <link rel="icon" href="favicon.ico" sizes="48x48" />
    <link rel="icon" href="favicon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="apple-touch-icon-180x180.png" />
    <title>Doinu</title>
    <style>
      :root {
        --font: 'Baloo 2', 'Fredoka', 'Nunito', system-ui, 'Segoe UI', sans-serif;
        --ink: #2a2350;
        --sky: linear-gradient(160deg, #5ec8ff 0%, #a07bff 55%, #ff8fd6 100%);
      }
      html,
      body {
        margin: 0;
        height: 100%;
        background: var(--sky);
        color: var(--ink);
        font-family: var(--font);
        overflow: hidden;
        -webkit-tap-highlight-color: transparent;
      }
      #app {
        display: flex;
        flex-direction: column;
        width: 100vw;
        height: 100vh;
      }
      /* The play field: a rich, lively violet so the coloured notes pop —
         bright and friendly, never a black void. */
      #stage {
        display: block;
        flex: 1 1 auto;
        width: 100%;
        min-height: 0;
        background: linear-gradient(180deg, #4634a6 0%, #6a47cf 60%, #8a5be0 100%);
      }
      /* A cheerful shelf under the keyboard. */
      #keys {
        display: block;
        flex: 0 0 26vh;
        width: 100%;
        background: linear-gradient(180deg, #ffd86b 0%, #ffc24d 100%);
        box-shadow: inset 0 4px 0 rgba(255, 255, 255, 0.5);
      }
      /* Big, game-y banner for instructions and celebrations. */
      #status {
        position: fixed;
        top: 1.1rem;
        left: 50%;
        transform: translateX(-50%);
        text-align: center;
        white-space: pre-line;
        font-size: clamp(1.5rem, 5.5vw, 2.6rem);
        font-weight: 800;
        line-height: 1.15;
        color: #fff;
        padding: 0.45rem 1.4rem;
        border-radius: 1.4rem;
        background: rgba(42, 35, 80, 0.5);
        text-shadow: 0 2px 10px rgba(40, 20, 90, 0.6);
        pointer-events: none;
        max-width: 92vw;
        z-index: 15;
      }
      #status:empty {
        display: none;
      }
      #status.pop {
        animation: status-pop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      }
      @keyframes status-pop {
        0% { transform: translateX(-50%) scale(0.6); }
        60% { transform: translateX(-50%) scale(1.12); }
        100% { transform: translateX(-50%) scale(1); }
      }
      /* Round, chunky floating buttons (report + back). */
      #report-toggle,
      #back-menu {
        position: fixed;
        z-index: 25;
        border: none;
        border-radius: 999px;
        background: #fff;
        color: var(--ink);
        font-family: var(--font);
        font-weight: 700;
        cursor: pointer;
        box-shadow: 0 6px 16px rgba(60, 30, 120, 0.35);
        transition: transform 0.12s ease;
      }
      #report-toggle:active,
      #back-menu:active {
        transform: scale(0.92);
      }
      #report-toggle {
        top: 0.9rem;
        right: 0.9rem;
        width: 3rem;
        height: 3rem;
        font-size: 1.4rem;
        line-height: 1;
      }
      #back-menu {
        top: 0.9rem;
        left: 0.9rem;
        padding: 0.7rem 1.2rem;
        font-size: 1.05rem;
      }
      #back-menu.hidden {
        display: none;
      }
      #report {
        position: fixed;
        top: 4.2rem;
        right: 0.9rem;
        z-index: 25;
        display: none;
        max-width: min(92vw, 34rem);
        max-height: 70vh;
        overflow: auto;
        padding: 1rem 1.2rem;
        border-radius: 1.1rem;
        background: #fff;
        color: var(--ink);
        font-size: 0.95rem;
        line-height: 1.6;
        box-shadow: 0 14px 36px rgba(60, 30, 120, 0.4);
      }
      #report.open {
        display: block;
      }
      #report > div {
        padding: 0.35rem 0;
        border-bottom: 1px solid rgba(120, 90, 200, 0.16);
      }
      /* ---- Start screen: the first impression, made to invite play ---- */
      #menu {
        position: fixed;
        inset: 0;
        z-index: 30;
        display: flex;
        flex-direction: column;
        align-items: center;
        /* flex-start + auto margins on the children: the card group centres when
           it fits and becomes scrollable (not clipped) on short screens. */
        justify-content: flex-start;
        gap: 1.25rem;
        background: var(--sky);
        overflow-y: auto;
        padding: 1.25rem 0 3.25rem;
        box-sizing: border-box;
      }
      #menu.hidden {
        display: none;
      }
      #menu .menu-card {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 1.1rem;
        width: min(86vw, 24rem);
        padding: 1.75rem 1.5rem 2rem;
        border-radius: 1.75rem;
        background: rgba(255, 255, 255, 0.92);
        box-shadow: 0 20px 50px rgba(60, 30, 120, 0.35);
        margin-top: auto; /* centres vertically when there is room */
        flex: 0 0 auto;
      }
      #menu .menu-status {
        margin-bottom: auto; /* pairs with the card's margin-top:auto to centre */
      }
      #menu .menu-title {
        margin: 0;
        font-size: 3rem;
        font-weight: 800;
        color: var(--ink);
        animation: bob 2.4s ease-in-out infinite;
      }
      #menu .menu-sub {
        margin: -0.5rem 0 0.25rem;
        font-size: 1.1rem;
        font-weight: 600;
        color: #8a5be0;
      }
      #menu .menu-list {
        display: flex;
        flex-direction: column;
        gap: 0.8rem;
        width: 100%;
      }
      .menu-btn {
        padding: 1rem 1.25rem;
        border: none;
        border-radius: 999px;
        color: #fff;
        background: #8a7bff; /* default; menu activities override below */
        font-family: var(--font);
        font-size: 1.2rem;
        font-weight: 700;
        cursor: pointer;
        box-shadow: 0 6px 0 rgba(0, 0, 0, 0.14);
        transition: transform 0.12s ease, box-shadow 0.12s ease;
      }
      .menu-btn:hover {
        transform: translateY(-2px);
      }
      .menu-btn:active {
        transform: translateY(3px);
        box-shadow: 0 2px 0 rgba(0, 0, 0, 0.14);
      }
      .menu-btn[data-activity='melody'] { background: #ff7eb3; }
      .menu-btn[data-activity='songs'] { background: #ff6b9d; }
      .menu-btn[data-activity='import'] { background: #c08bff; }
      .menu-btn[data-activity='practice'] { background: #7c83ff; }
      .menu-btn[data-activity='progress'] { background: #ffb454; }
      /* Songs / Progress overlays: reuse the menu look; scrollable content. */
      #songs,
      #progress {
        position: fixed;
        inset: 0;
        z-index: 30;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: var(--sky);
      }
      #songs.hidden,
      #progress.hidden {
        display: none;
      }
      #songs .menu-card,
      #progress .menu-card {
        max-height: 86vh;
      }
      .progress-content {
        width: 100%;
        overflow-y: auto;
        max-height: 62vh;
        text-align: left;
        color: var(--ink);
        font-size: 0.95rem;
        line-height: 1.5;
      }
      .progress-content > div {
        padding: 0.4rem 0.2rem;
        border-bottom: 1px solid rgba(120, 90, 200, 0.16);
      }
      .progress-content:empty::before {
        content: 'Play a little and your progress shows up here ✨';
        color: #8a5be0;
        font-weight: 600;
      }
      #progress-back {
        margin-top: 0.6rem;
        background: #6d5dfc;
      }
      #song-list {
        overflow-y: auto;
        max-height: 62vh;
        padding-right: 0.25rem;
        gap: 0.6rem;
      }
      /* Uniform song card: title + an equal-width row of hand buttons. */
      .song-card {
        width: 100%;
        box-sizing: border-box;
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
        padding: 0.65rem 0.7rem 0.7rem;
        border-radius: 1rem;
        background: rgba(124, 92, 255, 0.16);
      }
      .song-title {
        text-align: left;
        padding-left: 0.15rem;
        font-size: 1.05rem;
        font-weight: 800;
        color: var(--ink);
      }
      .song-hands {
        display: flex;
        gap: 0.4rem;
      }
      .hand-btn {
        flex: 1 1 0;
        min-width: 0;
        padding: 0.6rem 0.3rem;
        border: none;
        border-radius: 0.7rem;
        color: #fff;
        font-family: var(--font);
        font-weight: 700;
        font-size: 0.92rem;
        cursor: pointer;
        box-shadow: 0 4px 0 rgba(0, 0, 0, 0.14);
        transition: transform 0.1s ease, box-shadow 0.1s ease;
      }
      .hand-btn:active {
        transform: translateY(2px);
        box-shadow: 0 1px 0 rgba(0, 0, 0, 0.14);
      }
      .hand-btn[data-hand='R'] { background: #ff7eb3; }
      .hand-btn[data-hand='L'] { background: #4fc3f7; }
      .hand-btn[data-hand='both'] { background: #4cd4a0; }
      #songs-back {
        margin-top: 0.6rem;
        background: #6d5dfc;
      }
      .menu-btn[data-activity='echo'] { background: #4fc3f7; }
      .menu-btn[data-activity='c-major-up'] { background: #ffa14a; }
      .menu-btn[data-activity='c-major-updown'] { background: #b07bff; }
      .menu-btn[data-activity='memory'] { background: #ff9f6b; }
      .menu-btn[data-activity='notefind'] { background: #5cd0e0; }
      .menu-btn[data-activity='ear'] { background: #f78fb3; }
      .menu-btn[data-activity='free'] { background: #4cd4a0; }
      #menu .menu-status {
        min-height: 1.2rem;
        max-width: min(86vw, 24rem);
        text-align: center;
        font-size: 1rem;
        font-weight: 600;
        color: #fff;
        text-shadow: 0 2px 6px rgba(40, 20, 90, 0.45);
      }
      #menu .menu-version {
        position: fixed;
        bottom: 0.9rem;
        left: 0;
        right: 0;
        margin: 0;
        text-align: center;
        font-size: 0.85rem;
        font-weight: 600;
        color: rgba(255, 255, 255, 0.85);
        text-shadow: 0 1px 4px rgba(40, 20, 90, 0.4);
      }
      @keyframes bob {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-8px); }
      }
      @media (prefers-reduced-motion: reduce) {
        #menu .menu-title { animation: none; }
      }
    </style>
  </head>
  <body>
    <div id="app">
      <canvas id="stage"></canvas>
      <canvas id="keys"></canvas>
    </div>
    <div id="status"></div>
    <div id="menu">
      <div class="menu-card">
        <h1 class="menu-title">🎹 Doinu</h1>
        <p class="menu-sub">¡A jugar! 🎶</p>
        <div class="menu-list">
          <button class="menu-btn" type="button" data-activity="melody">🎵 Melody</button>
          <button class="menu-btn" type="button" data-activity="songs">🎶 Songs</button>
          <button class="menu-btn" type="button" data-activity="import">📂 Load MIDI</button>
          <button class="menu-btn" type="button" data-activity="practice">🐢 Practice (wait)</button>
          <button class="menu-btn" type="button" data-activity="progress">📊 Progress</button>
          <button class="menu-btn" type="button" data-activity="echo">🔁 Echo</button>
          <button class="menu-btn" type="button" data-activity="memory">🧠 Memory</button>
          <button class="menu-btn" type="button" data-activity="notefind">🔎 Find the note</button>
          <button class="menu-btn" type="button" data-activity="ear">👂 Listen &amp; play</button>
          <button class="menu-btn" type="button" data-activity="c-major-up">🪜 Scale up</button>
          <button class="menu-btn" type="button" data-activity="c-major-updown">🎢 Scale up &amp; down</button>
          <button class="menu-btn" type="button" data-activity="free">✨ Free play</button>
        </div>
      </div>
      <div id="menu-status" class="menu-status"></div>
      <p id="version" class="menu-version"></p>
    </div>
    <div id="songs" class="hidden">
      <div class="menu-card">
        <h1 class="menu-title">🎶 Songs</h1>
        <p class="menu-sub">Pick a song 🎹</p>
        <div id="song-list" class="menu-list"></div>
        <button id="songs-back" class="menu-btn" type="button">← Menu</button>
      </div>
    </div>
    <div id="progress" class="hidden">
      <div class="menu-card">
        <h1 class="menu-title">📊 Progress</h1>
        <p class="menu-sub">How you're doing 🌟</p>
        <div id="progress-content" class="progress-content"></div>
        <button id="progress-back" class="menu-btn" type="button">← Menu</button>
      </div>
    </div>
    <button id="back-menu" class="hidden" type="button">← Menu</button>
    <input
      id="midi-file"
      type="file"
      accept=".mid,.midi"
      style="position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0 0 0 0); border: 0;"
    />
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
