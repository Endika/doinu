<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0a0a0f" />
    <title>Doinu</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        background: #0a0a0f;
        color: #e8e8ef;
        font-family: system-ui, sans-serif;
        overflow: hidden;
      }
      #app {
        display: flex;
        flex-direction: column;
        width: 100vw;
        height: 100vh;
      }
      #stage {
        display: block;
        flex: 1 1 auto;
        width: 100%;
        min-height: 0;
      }
      #keys {
        display: block;
        flex: 0 0 26vh;
        width: 100%;
      }
      #status {
        position: fixed;
        top: 1rem;
        left: 50%;
        transform: translateX(-50%);
        text-align: center;
        white-space: pre-line;
        font-size: 1rem;
        pointer-events: none;
        text-shadow: 0 1px 4px rgba(0, 0, 0, 0.8);
      }
      #report-toggle {
        position: fixed;
        top: 0.75rem;
        right: 0.75rem;
        z-index: 20;
        width: 2.5rem;
        height: 2.5rem;
        border: 1px solid rgba(232, 232, 239, 0.25);
        border-radius: 0.5rem;
        background: rgba(20, 20, 30, 0.85);
        color: #e8e8ef;
        font-size: 1.2rem;
        line-height: 1;
        cursor: pointer;
      }
      #report-toggle:hover {
        background: rgba(40, 40, 60, 0.95);
      }
      #report {
        position: fixed;
        top: 3.5rem;
        right: 0.75rem;
        z-index: 20;
        display: none;
        max-width: min(90vw, 32rem);
        max-height: 70vh;
        overflow: auto;
        padding: 0.75rem 1rem;
        border: 1px solid rgba(232, 232, 239, 0.25);
        border-radius: 0.5rem;
        background: rgba(15, 15, 24, 0.96);
        color: #e8e8ef;
        font-size: 0.85rem;
        line-height: 1.5;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.6);
      }
      #report.open {
        display: block;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <canvas id="stage"></canvas>
      <canvas id="keys"></canvas>
    </div>
    <div id="status"></div>
    <button id="report-toggle" type="button" aria-label="Toggle progress report">📊</button>
    <div id="report" aria-live="polite"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
